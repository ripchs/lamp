name: Build lamp.exe

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyinstaller bleak fastapi uvicorn

      - name: Build exe
        run: pyinstaller --onefile --name lamp lamp.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lamp-windows
          path: dist/lamp.exe
